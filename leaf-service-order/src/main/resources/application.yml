server:
  port: 8082

spring:
  application:
    name: leaf-service-order
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
    openfeign:
      circuitbreaker:
        # 开启 OpenFeign 熔断保护开关，与 Sentinel 结合
        enabled: true
        group:
          enabled: true
    sentinel:
      transport:
        dashboard: 127.0.0.1:8080 # Sentinel Dashboard暂时先不配独立服务，如果后续有Dashboard，指向Dashboard端口

  config:
    import:
      - optional:nacos:leaf-service-order.yaml?refreshEnabled=true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 请根据您本地 MySQL 的实际情况修改密码
    url: jdbc:mysql://127.0.0.1:3306/leaf_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123123

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: leaf-service-order-group

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0 # 100% 采样率，保证开发环境每条调用都被记录
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

logging:
  file:
    name: logs/${spring.application.name}/app.log

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: default_tx_group
  service:
    vgroup-mapping:
      default_tx_group: default
    grouplist:
      default: 127.0.0.1:8091

# XXL-JOB Configuration
xxl:
  job:
    admin:
      addresses: http://127.0.0.1:8088/xxl-job-admin
    executor:
      appname: leaf-service-order-executor
      ip:
      port: 9998
      logpath: ./logs/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: default_token
