apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaf-service-order-deployment
  labels:
    app: leaf-service-order
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaf-service-order
  template:
    metadata:
      labels:
        app: leaf-service-order
    spec:
      containers:
      - name: leaf-service-order
        image: leaf/leaf-service-order:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        - containerPort: 9998
        env:
        - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
          value: "host.docker.internal:8848"
        - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
          value: "host.docker.internal:8848"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://host.docker.internal:3306/leaf_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai"
        - name: ROCKETMQ_NAME_SERVER
          value: "host.docker.internal:9876;host.docker.internal:9877"
        - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
          value: "http://host.docker.internal:9411/api/v2/spans"
        - name: SEATA_SERVICE_GROUPLIST_DEFAULT
          value: "host.docker.internal:8091"
        - name: XXL_JOB_ADMIN_ADDRESSES
          value: "http://host.docker.internal:8088/xxl-job-admin"
        # 强制执行器IP注册为宿主机IP，端口为暴露出来的NodePort 30098，以供Docker中的admin调用
        - name: XXL_JOB_EXECUTOR_IP
          value: "host.docker.internal"
        - name: XXL_JOB_EXECUTOR_PORT
          value: "30098"
---
apiVersion: v1
kind: Service
metadata:
  name: leaf-service-order-svc
spec:
  type: NodePort 
  selector:
    app: leaf-service-order
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082
      nodePort: 30082
    - name: xxljob
      protocol: TCP
      port: 30098
      targetPort: 9998
      nodePort: 30098
