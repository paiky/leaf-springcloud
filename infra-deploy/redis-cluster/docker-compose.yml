version: '3.8'

# Redis 高可用集群 (3主3从) Docker Compose 方案
# 重点：通过 cluster-announce-ip 解决 Docker NAT 导致的外部应用程序无法访问集群的问题。

x-redis-common: &redis-common
  image: redis:latest
  restart: always
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  redis-node-1:
    <<: *redis-common
    container_name: leaf-redis-node-1
    command: >
      redis-server 
      --cluster-enabled yes 
      --cluster-config-file nodes.conf 
      --cluster-node-timeout 5000 
      --appendonly yes 
      --cluster-announce-ip host.docker.internal 
      --cluster-announce-port 6371 
      --cluster-announce-bus-port 16371
    ports:
      - "6371:6379"
      - "16371:16379"
    volumes:
      - ./data/node-1:/data

  redis-node-2:
    <<: *redis-common
    container_name: leaf-redis-node-2
