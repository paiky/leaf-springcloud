server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 收割宿主机上挂载过来的 Spring Boot 日志文件
  - job_name: springboot-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: microservices
          __path__: /var/log/leaf/**/*.log
